<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>季語ゲーム & ランダム表示</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Zen+Maru+Gothic:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sakura: #f4c2c2;
    --momiji: #d2691e;
    --yuki: #f8f9fa;
    --sumi: #2c2c2c;
    --kinpaku: #ffd700;
    --midori: #228b22;
    --murasaki: #9370db;
    --vermillion: #ff4500;
    --shadow: rgba(44, 44, 44, 0.1);
    --deep-shadow: rgba(44, 44, 44, 0.3);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: linear-gradient(135deg, var(--sakura) 0%, var(--yuki) 50%, #e6f3ff 100%);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* 背景の和紙テクスチャ */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
      radial-gradient(circle at 20% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(147, 112, 219, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 40% 40%, rgba(255, 69, 0, 0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* 浮遊する桜の花びら */
  .sakura-petal {
    position: fixed;
    width: 10px;
    height: 10px;
    background: var(--sakura);
    border-radius: 50% 0 50% 0;
    opacity: 0.6;
    animation: fall linear infinite;
    z-index: 1;
  }

  @keyframes fall {
    0% {
      transform: translateY(-100vh) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(100vh) rotate(360deg);
      opacity: 0;
    }
  }

  .container {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  .header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .title {
    font-family: 'Zen Kurenaido', cursive;
    font-size: 3rem;
    color: var(--sumi);
    text-shadow: 2px 2px 4px var(--shadow);
    margin-bottom: 0.5rem;
    background: linear-gradient(45deg, var(--vermillion), var(--kinpaku), var(--murasaki));
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { filter: hue-rotate(0deg); }
    50% { filter: hue-rotate(30deg); }
  }

  .subtitle {
    font-size: 1.2rem;
    color: var(--sumi);
    opacity: 0.8;
    font-weight: 300;
  }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2rem;
    width: 100%;
    max-width: 900px;
    margin-bottom: 2rem;
  }

  .menu-card {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 2rem;
    text-align: center;
    box-shadow: 
      0 10px 30px var(--shadow),
      inset 0 1px 0 rgba(255, 255, 255, 0.8);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border: 2px solid transparent;
    position: relative;
    overflow: hidden;
  }

  .menu-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255, 215, 0, 0.1), transparent);
    transform: rotate(-45deg);
    transition: transform 0.6s ease;
  }

  .menu-card:hover::before {
    transform: rotate(-45deg) translate(100%, 100%);
  }

  .menu-card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 
      0 20px 50px var(--deep-shadow),
      inset 0 1px 0 rgba(255, 255, 255, 1);
    border-color: var(--kinpaku);
  }

  .card-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
    display: block;
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-10px); }
    60% { transform: translateY(-5px); }
  }

  .card-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--sumi);
    margin-bottom: 1rem;
  }

  .card-desc {
    color: var(--sumi);
    opacity: 0.7;
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }

  .card-button {
    background: linear-gradient(135deg, var(--vermillion), var(--momiji));
    color: white;
    border: none;
    padding: 1rem 2rem;
    border-radius: 50px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    font-family: inherit;
  }

  .card-button:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(255, 69, 0, 0.3);
  }

  .card-button:active {
    transform: scale(0.98);
  }

  /* ゲーム画面 */
  .game-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, var(--murasaki) 0%, var(--sakura) 50%, var(--kinpaku) 100%);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.5s ease;
    padding: 1rem;
    box-sizing: border-box;
  }

  .game-screen.active {
    display: flex;
  }

  .game-box {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 1.5rem;
    max-width: 700px;
    width: 100%;
    max-height: 90vh;
    text-align: center;
    box-shadow: 
      0 25px 50px var(--deep-shadow),
      inset 0 1px 0 rgba(255, 255, 255, 1);
    position: relative;
    border: 3px solid var(--kinpaku);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .game-title {
    font-family: 'Zen Kurenaido', cursive;
    font-size: 1.5rem;
    color: var(--sumi);
    margin-bottom: 1rem;
    flex-shrink: 0;
  }

  .timer {
    font-size: 1.5rem;
    font-weight: 900;
    margin-bottom: 1rem;
    background: linear-gradient(45deg, var(--vermillion), var(--kinpaku));
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: pulse 1s ease-in-out infinite;
    flex-shrink: 0;
  }

  .question {
    font-family: 'Zen Kurenaido', cursive;
    font-size: 2.5rem;
    color: var(--sumi);
    margin: 1rem 0;
    padding: 1.5rem;
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(147, 112, 219, 0.1));
    border-radius: 15px;
    border: 2px dashed var(--kinpaku);
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    word-break: break-all;
    flex-shrink: 0;
  }

  .game-input {
    width: 100%;
    padding: 1rem;
    font-size: 1.1rem;
    border: 3px solid var(--kinpaku);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.9);
    color: var(--sumi);
    margin: 0.8rem 0;
    font-family: inherit;
    text-align: center;
  }

  .season-options {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.8rem;
    margin: 1rem 0;
  }

  .season-option {
    padding: 1rem 0.5rem;
    border: 3px solid var(--kinpaku);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.9);
    color: var(--sumi);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
  }

  .game-buttons {
    display: flex;
    gap: 0.8rem;
    margin-top: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    flex-shrink: 0;
  }

  .game-btn {
    padding: 0.8rem 1.5rem;
    border: none;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--midori), var(--kinpaku));
    color: white;
  }

  .btn-secondary {
    background: linear-gradient(135deg, var(--sumi), #666);
    color: white;
  }

  .btn-danger {
    background: linear-gradient(135deg, var(--vermillion), var(--momiji));
    color: white;
  }

  .game-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px var(--shadow);
  }

  .result {
    margin: 1rem 0;
    padding: 1.5rem;
    border-radius: 15px;
    font-weight: 600;
    font-size: 1.1rem;
  }

  .result.correct {
    background: linear-gradient(135deg, rgba(34, 139, 34, 0.1), rgba(255, 215, 0, 0.1));
    color: var(--midori);
    border: 2px solid var(--midori);
  }

  .result.incorrect {
    background: linear-gradient(135deg, rgba(255, 69, 0, 0.1), rgba(210, 105, 30, 0.1));
    color: var(--vermillion);
    border: 2px solid var(--vermillion);
  }

  .score {
    font-size: 1rem;
    color: var(--sumi);
    margin-top: 0.8rem;
    font-weight: 600;
    flex-shrink: 0;
  }

  .result {
    margin: 0.8rem 0;
    padding: 1rem;
    border-radius: 12px;
    font-weight: 600;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .random-info {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.8rem;
    margin: 1rem 0;
  }

  .info-badge {
    background: linear-gradient(135deg, var(--kinpaku), var(--yuki));
    padding: 0.8rem;
    border-radius: 12px;
    border: 2px solid var(--kinpaku);
  }

  .info-label {
    font-size: 0.75rem;
    color: var(--sumi);
    opacity: 0.7;
    margin-bottom: 0.3rem;
  }

  .info-value {
    font-size: 1rem;
    font-weight: 700;
    color: var(--sumi);
  }

  .refresh-btn {
    background: linear-gradient(135deg, var(--murasaki), var(--sakura));
    color: white;
    border: none;
    padding: 1rem 2rem;
    border-radius: 20px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin: 1rem 0;
    font-family: inherit;
  }

  .refresh-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(147, 112, 219, 0.3);
  }

  /* ランダム季語フィルター */
  .random-filters {
    margin-bottom: 1rem;
    flex-shrink: 0;
  }

  .filter-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .filter-row label {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--sumi);
    white-space: nowrap;
  }

  .filter-select {
    padding: 0.5rem;
    border: 2px solid var(--kinpaku);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.9);
    color: var(--sumi);
    font-size: 0.85rem;
    font-family: inherit;
    min-width: 100px;
  }

  .filter-select:focus {
    outline: none;
    border-color: var(--vermillion);
  }

  .random-counter {
    font-size: 0.8rem;
    color: var(--sumi);
    opacity: 0.7;
    white-space: nowrap;
  }

  #kigoCount {
    font-weight: 600;
    color: var(--vermillion);
  }

  /* 親季語表示 */
  .parent-info {
    margin: 1rem 0;
    padding: 1rem;
    background: linear-gradient(135deg, rgba(255, 69, 0, 0.1), rgba(210, 105, 30, 0.1));
    border: 2px solid var(--vermillion);
    border-radius: 12px;
    flex-shrink: 0;
  }

  .parent-label {
    font-size: 0.8rem;
    color: var(--vermillion);
    font-weight: 600;
    margin-bottom: 0.5rem;
  }

  .parent-value {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--sumi);
    font-family: 'Zen Kurenaido', cursive;
  }

  @media (max-width: 768px) {
    .title {
      font-size: 2rem;
    }

    .menu-grid {
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    .game-screen {
      padding: 1rem 0.5rem;
    }

    .game-box {
      padding: 1.5rem 1rem;
      border-radius: 20px;
    }

    .question {
      font-size: 2rem;
      padding: 1.5rem;
      min-height: 80px;
    }

    .season-options {
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .game-buttons {
      flex-direction: column;
    }

    .filter-options {
      gap: 0.3rem;
    }

    .filter-btn {
      padding: 0.3rem 0.6rem;
      font-size: 0.75rem;
    }

    .random-info {
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .back-btn {
      top: 10px;
      left: 10px;
      padding: 0.8rem;
      font-size: 1.2rem;
    }
  }
</style>
</head>
<body>

<!-- 桜の花びらアニメーション -->
<script>
function createSakuraPetal() {
  const petal = document.createElement('div');
  petal.className = 'sakura-petal';
  petal.style.left = Math.random() * 100 + 'vw';
  petal.style.animationDuration = (Math.random() * 10 + 15) + 's';
  petal.style.animationDelay = Math.random() * 5 + 's';
  document.body.appendChild(petal);
  
  setTimeout(() => petal.remove(), 25000);
}

setInterval(createSakuraPetal, 2000);
</script>

<div class="container">
  <!-- メインメニュー -->
  <div class="main-menu">
    <div class="header">
      <h1 class="title">季語ゲーム</h1>
      <p class="subtitle">俳句の季語で遊ぼう</p>
    </div>

    <div class="menu-grid">
      <div class="menu-card">
        <span class="card-icon">🎯</span>
        <h2 class="card-title">読み方ゲーム</h2>
        <p class="card-desc">季語の正しい読み方を20秒以内に答えよう！漢字を見て、ひらがなで入力してください。</p>
        <button class="card-button" onclick="startReadingGame()">ゲーム開始</button>
      </div>

      <div class="menu-card">
        <span class="card-icon">🌸</span>
        <h2 class="card-title">季節当てゲーム</h2>
        <p class="card-desc">季語がどの季節なのかを当てよう！春夏秋冬新年の5つから選択してください。</p>
        <button class="card-button" onclick="startSeasonGame()">ゲーム開始</button>
      </div>

      <div class="menu-card">
        <span class="card-icon">🎲</span>
        <h2 class="card-title">ランダム季語</h2>
        <p class="card-desc">季節や時期を指定してランダムに季語を表示します。俳句作りのヒントや季語学習にご活用ください。</p>
        <button class="card-button" onclick="showRandomKigo()">季語を表示</button>
      </div>
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div class="game-screen" id="gameScreen">
    <button class="back-btn" onclick="backToMenu()">← 戻る</button>
    <div class="game-box">
      <h2 class="game-title" id="gameTitle">ゲーム</h2>
      <div class="timer" id="timer">20秒</div>
      <div class="question" id="question">準備中...</div>
      
      <!-- 読み方ゲーム用 -->
      <input type="text" class="game-input" id="gameInput" placeholder="ひらがなで入力してください" style="display:none">
      
      <!-- 季節当てゲーム用 -->
      <div class="season-options" id="seasonOptions" style="display:none">
        <button class="season-option" data-season="新年">🎍 新年</button>
        <button class="season-option" data-season="春">🌸 春</button>
        <button class="season-option" data-season="夏">🌻 夏</button>
        <button class="season-option" data-season="秋">🍁 秋</button>
        <button class="season-option" data-season="冬">❄️ 冬</button>
      </div>

      <!-- ランダム表示用 -->
      <div class="random-display" id="randomDisplay" style="display:none">
        <!-- フィルター選択 -->
        <div class="random-filters" id="randomFilters">
          <div class="filter-row">
            <label>季節:</label>
            <select class="filter-select" id="seasonSelect">
              <option value="all">全季節</option>
              <option value="新年">🎍 新年</option>
              <option value="春">🌸 春</option>
              <option value="夏">🌻 夏</option>
              <option value="秋">🍁 秋</option>
              <option value="冬">❄️ 冬</option>
            </select>
            
            <label>時期:</label>
            <select class="filter-select" id="periodSelect">
              <option value="all">全時期</option>
              <option value="初春">初春</option>
              <option value="仲春">仲春</option>
              <option value="晩春">晩春</option>
              <option value="三春">三春</option>
              <option value="初夏">初夏</option>
              <option value="仲夏">仲夏</option>
              <option value="晩夏">晩夏</option>
              <option value="三夏">三夏</option>
              <option value="初秋">初秋</option>
              <option value="仲秋">仲秋</option>
              <option value="晩秋">晩秋</option>
              <option value="三秋">三秋</option>
              <option value="初冬">初冬</option>
              <option value="仲冬">仲冬</option>
              <option value="晩冬">晩冬</option>
              <option value="三冬">三冬</option>
            </select>
            
            <label>分類:</label>
            <select class="filter-select" id="categorySelect">
              <option value="all">全分類</option>
              <option value="時候">🌡️ 時候</option>
              <option value="天文">⭐ 天文</option>
              <option value="地理">🏔️ 地理</option>
              <option value="行事">🎊 行事</option>
              <option value="生活">🏠 生活</option>
              <option value="植物">🌿 植物</option>
              <option value="動物">🐾 動物</option>
            </select>
            
            <span class="random-counter">該当: <span id="kigoCount">-</span>個</span>
          </div>
        </div>
        
        <div class="random-info">
          <div class="info-badge">
            <div class="info-label">季節</div>
            <div class="info-value" id="randomSeason">-</div>
          </div>
          <div class="info-badge">
            <div class="info-label">時期</div>
            <div class="info-value" id="randomPeriod">-</div>
          </div>
          <div class="info-badge">
            <div class="info-label">分類</div>
            <div class="info-value" id="randomCategory">-</div>
          </div>
          <div class="info-badge">
            <div class="info-label">読み方</div>
            <div class="info-value" id="randomReading">-</div>
          </div>
        </div>
        
        <!-- 傍題の場合の親季語表示 -->
        <div class="parent-info" id="parentInfo" style="display:none">
          <div class="parent-label">本季語（親季語）</div>
          <div class="parent-value" id="parentName">-</div>
        </div>
        
        <button class="refresh-btn" onclick="generateRandomKigo()">🎲 この条件で季語を表示</button>
      </div>

      <div class="result" id="result" style="display:none"></div>
      
      <div class="game-buttons" id="gameButtons">
        <button class="game-btn btn-primary" id="submitBtn" onclick="submitAnswer()" style="display:none">回答</button>
        <button class="game-btn btn-secondary" onclick="skipQuestion()" style="display:none" id="skipBtn">スキップ</button>
      </div>

      <div class="score" id="score" style="display:none">
        スコア: <span id="scoreValue">0</span> / <span id="totalValue">0</span>
        &nbsp;｜&nbsp; 残機: <span id="heartsDisplay">❤️❤️❤️</span>
      </div>
    </div>
  </div>
</div>

<!-- ゲームオーバー画面 -->
<div class="game-screen" id="gameOverScreen">
  <div class="game-box" style="max-width:500px; text-align:center;">
    <div style="font-size:5rem; margin-bottom:1rem;">💀</div>
    <h2 style="font-family:'Zen Kurenaido',cursive; font-size:2.5rem; color:var(--vermillion); margin-bottom:1rem;">ゲームオーバー</h2>
    <p style="font-size:1.1rem; color:var(--sumi); margin-bottom:0.5rem;">3回ミスしました…</p>
    <div style="background:linear-gradient(135deg,rgba(255,69,0,0.1),rgba(255,215,0,0.1)); border:2px solid var(--kinpaku); border-radius:15px; padding:1.5rem; margin:1.5rem 0;">
      <p style="font-size:1rem; color:var(--sumi); opacity:0.8; margin-bottom:0.5rem;">最終スコア</p>
      <p style="font-family:'Zen Kurenaido',cursive; font-size:3rem; font-weight:900; color:var(--sumi);">
        <span id="finalScore">0</span> <span style="font-size:1.5rem;">/ <span id="finalTotal">0</span></span>
      </p>

// 親季語から季節・時期・部類を取得するヘルパー関数
function getParentInfo(parentName) {
  const parent = RAW.find(k => k.w === parentName);
  return parent ? {s: parent.s, p: parent.p, c: parent.c} : {s: '春', p: '三春', c: '時候'};
}

// 傍題の拡張情報を取得（親季語の情報を含む）
function getBoudaiExtended(boudai) {
  if (boudai.type !== 'boudai') return boudai;
  
  const parentInfo = getParentInfo(boudai.parent);
  return {
    ...boudai,
    s: parentInfo.s,
    p: parentInfo.p, 
    c: parentInfo.c
  };
}


// メインの季語データと傍題データを統合（傍題は親季語情報を拡張）
let ALL_KIGO = RAW.concat(BOUDAI_NEW.map(getBoudaiExtended));
console.log(`総データ数: ${ALL_KIGO.length} (季語: ${RAW.length}, 傍題: ${BOUDAI_NEW.length})`);

// 外部サイト(https://slbzk.github.io/kigo/)からデータを取得して置き換える
(async function fetchExternalKigo() {
  const candidates = [
    'https://slbzk.github.io/kigo/kigo.js',
    'https://slbzk.github.io/kigo/data.js',
    'https://slbzk.github.io/kigo/kigo-data.js',
    'https://slbzk.github.io/kigo/kigo_data.js',
  ];
  for (const url of candidates) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const text = await res.text();
      if (text.includes('{w:') || text.includes('"w":')) {
        const blob = new Blob([text], {type: 'application/javascript'});
        const blobURL = URL.createObjectURL(blob);
        try {
          await import(blobURL);
          if (typeof EXTERNAL_KIGO !== 'undefined' && Array.isArray(EXTERNAL_KIGO)) {
            ALL_KIGO = EXTERNAL_KIGO.map(k => k.type === 'boudai' ? getBoudaiExtended(k) : k);
            console.log(`✅ 外部データ取得成功(${url}): ${ALL_KIGO.length}件`);
          }
        } finally {
          URL.revokeObjectURL(blobURL);
        }
        break;
      }
    } catch(e) {
      console.log(`外部データ取得失敗(${url}): 内蔵データを使用`);
    }
  }
  console.log(`使用データ: ${ALL_KIGO.length}件`);
})();

function nextReadingQuestion() {
  // 漢字を含む季語のみを対象
  const validKigo = ALL_KIGO.filter(k => {
    if (!k.k || k.k.trim() === '' || k.k.includes('・') || k.k.includes('／')) return false;
    
    const hasKanji = /[一-龯]/.test(k.w);
    const isOnlyHiraganaKatakana = /^[あ-んァ-ヶー・]+$/.test(k.w);
    
    return hasKanji && !isOnlyHiraganaKatakana;
  });

  if (validKigo.length === 0) {
    showResult('出題可能な季語がありません', 'incorrect');
    return;
  }

  const randomIndex = Math.floor(Math.random() * validKigo.length);
  gameState.currentKigo = validKigo[randomIndex];
  gameState.timeLeft = 20;
  gameState.answered = false;
  gameState.total++;

  question.textContent = gameState.currentKigo.w;
  gameInput.value = '';
  gameInput.disabled = false;
  gameInput.focus();
  result.style.display = 'none';
  submitBtn.style.display = 'inline-block';
  skipBtn.style.display = 'inline-block';

  updateScore();
  startTimer();
}

  updateDropdownUI();
  updateKigoCount();
  
  // 初回はランダムに1つ表示
  generateRandomKigo();
}

function updateDropdownUI() {
  document.getElementById('seasonSelect').value = randomFilter.season;
  document.getElementById('periodSelect').value = randomFilter.period;
  document.getElementById('categorySelect').value = randomFilter.category;
}

function updateKigoCount() {
  const filteredKigo = getFilteredKigo();
  document.getElementById('kigoCount').textContent = filteredKigo.length;
}

function getFilteredKigo() {
  return ALL_KIGO.filter(k => {
    if (!k || !k.w) return false;
    
    // 季節フィルター
    if (randomFilter.season !== 'all' && k.s !== randomFilter.season) return false;
    
    // 時期フィルター
    if (randomFilter.period !== 'all' && k.p !== randomFilter.period) return false;
    
    // 分類フィルター
    if (randomFilter.category !== 'all' && k.c !== randomFilter.category) return false;
    
    return true;
  });
}

function generateRandomKigo() {
  const filteredKigo = getFilteredKigo();

  console.log(`🎲 フィルター条件:`, randomFilter);
  console.log(`🎲 該当季語数: ${filteredKigo.length}`);

  if (filteredKigo.length === 0) {
    question.textContent = '該当する季語がありません';
    document.getElementById('randomSeason').textContent = '-';
    document.getElementById('randomPeriod').textContent = '-';
    document.getElementById('randomCategory').textContent = '-';
    document.getElementById('randomReading').textContent = '-';
    document.getElementById('parentInfo').style.display = 'none';
    return;
  }

  const randomIndex = Math.floor(Math.random() * filteredKigo.length);
  const randomKigo = filteredKigo[randomIndex];

  console.log(`🎲 選択された季語:`, randomKigo);

  question.textContent = randomKigo.w;
  document.getElementById('randomSeason').textContent = randomKigo.s || '-';
  document.getElementById('randomPeriod').textContent = randomKigo.p || '-';
  document.getElementById('randomCategory').textContent = randomKigo.c || '-';
  document.getElementById('randomReading').textContent = randomKigo.k || '-';
  
  // 傍題の場合は親季語を表示
  if (randomKigo.type === 'boudai' && randomKigo.parent) {
    document.getElementById('parentInfo').style.display = 'block';
    document.getElementById('parentName').textContent = randomKigo.parent;
    console.log(`🎲 傍題です。親季語: ${randomKigo.parent}`);
  } else {
    document.getElementById('parentInfo').style.display = 'none';
    console.log(`🎲 見出し季語です`);
  }
  
  console.log(`🎲 ランダム季語表示完了: ${randomKigo.w}`);
}

// ドロップダウン変更イベント
document.addEventListener('change', (e) => {
  if (gameState.type === 'random' && (e.target.id === 'seasonSelect' || e.target.id === 'periodSelect' || e.target.id === 'categorySelect')) {
    if (e.target.id === 'seasonSelect') {
      randomFilter.season = e.target.value;
    } else if (e.target.id === 'periodSelect') {
      randomFilter.period = e.target.value;
    } else if (e.target.id === 'categorySelect') {
      randomFilter.category = e.target.value;
    }
    
    console.log(`🎲 フィルター更新:`, randomFilter);
    updateKigoCount();
  }
});

// タイマー開始
function startTimer() {
  if (gameState.timer) clearInterval(gameState.timer);

  gameState.timer = setInterval(() => {
    gameState.timeLeft--;
    updateTimer();

    if (gameState.timeLeft <= 0) {
      timeUp();
    }
  }, 1000);
}

function updateTimer() {
  timer.textContent = `${gameState.timeLeft}秒`;
  
  if (gameState.timeLeft <= 5) {
    timer.style.color = 'var(--vermillion)';
  } else if (gameState.timeLeft <= 10) {
    timer.style.color = 'var(--momiji)';
  } else {
    timer.style.color = '';
  }
}

function updateScore() {
  document.getElementById('scoreValue').textContent = gameState.score;
  document.getElementById('totalValue').textContent = gameState.total;
  // 残機ハート表示（3-mistakes個のハート）
  const remaining = Math.max(0, 3 - gameState.mistakes);
  const hearts = '❤️'.repeat(remaining) + '🖤'.repeat(3 - remaining);
  document.getElementById('heartsDisplay').textContent = hearts;
}

// ゲームオーバー処理
function triggerGameOver() {
  gameState.isActive = false;
  clearInterval(gameState.timer);
  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('finalScore').textContent = gameState.score;
  document.getElementById('finalTotal').textContent = gameState.total;
  document.getElementById('gameOverScreen').classList.add('active');
}

// リトライ
function retryGame() {
  document.getElementById('gameOverScreen').classList.remove('active');
  if (gameState.lastType === 'reading') {
    startReadingGame();
  } else if (gameState.lastType === 'season') {
    startSeasonGame();
  }
}

// ゲームオーバーからメニューへ
function backToMenuFromGameOver() {
  document.getElementById('gameOverScreen').classList.remove('active');
  resetGameUI();
}

// 回答送信
function submitAnswer() {
  if (gameState.answered) return;

  const userAnswer = gameInput.value.trim();
  const correctAnswer = gameState.currentKigo.k.trim();

  if (userAnswer === correctAnswer) {
    gameState.answered = true;
    clearInterval(gameState.timer);
    gameState.score++;
    showResult(`正解！「${correctAnswer}」`, 'correct');
    updateScore();

    setTimeout(() => {
      if (gameState.isActive) {
        nextReadingQuestion();
      }
    }, 3000);
  } else {
    // ミスカウント
    gameState.mistakes++;
    updateScore();
    if (gameState.mistakes >= 3) {
      gameState.answered = true;
      clearInterval(gameState.timer);
      showResult(`不正解！正解は「${correctAnswer}」\n3回ミスしました…`, 'incorrect');
      setTimeout(() => triggerGameOver(), 2500);
    } else {
      showResult(`不正解です。残り${3 - gameState.mistakes}回ミスでゲームオーバー！`, 'incorrect');
      gameInput.value = '';
      gameInput.focus();
      setTimeout(() => {
        if (gameState.isActive && !gameState.answered) {
          result.style.display = 'none';
        }
      }, 2000);
    }
  }
}

// 季節選択
document.addEventListener('click', (e) => {
  if (e.target.classList.contains('season-option') && gameState.type === 'season' && gameState.isActive && !gameState.answered) {
    submitSeasonAnswer(e.target.dataset.season);
  }
});

function submitSeasonAnswer(selectedSeason) {
  if (gameState.answered) return;

  gameState.answered = true;
  clearInterval(gameState.timer);

  const correctSeason = gameState.currentKigo.s;

  document.querySelectorAll('.season-option').forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.season === selectedSeason) {
      btn.classList.add('selected');
    }
  });

  if (selectedSeason === correctSeason) {
    gameState.score++;
    showResult(`正解！「${gameState.currentKigo.w}」は${correctSeason}の季語です。`, 'correct');
    updateScore();
    setTimeout(() => {
      if (gameState.isActive) {
        nextSeasonQuestion();
      }
    }, 4000);
  } else {
    gameState.mistakes++;
    showResult(`不正解。「${gameState.currentKigo.w}」は${correctSeason}の季語です。`, 'incorrect');
    updateScore();
    if (gameState.mistakes >= 3) {
      setTimeout(() => triggerGameOver(), 2500);
    } else {
      setTimeout(() => {
        if (gameState.isActive) {
          nextSeasonQuestion();
        }
      }, 4000);
    }
  }
}

// スキップ
function skipQuestion() {
  if (gameState.answered) return;

  gameState.answered = true;
  clearInterval(gameState.timer);
  gameState.mistakes++;

  let message = '';
  if (gameState.type === 'reading') {
    message = `スキップしました。答えは「${gameState.currentKigo.k}」でした。`;
  } else if (gameState.type === 'season') {
    message = `スキップしました。「${gameState.currentKigo.w}」は${gameState.currentKigo.s}の季語でした。`;
    document.querySelectorAll('.season-option').forEach(btn => { btn.disabled = true; });
  }

  showResult(message, 'incorrect');
  updateScore();

  if (gameState.mistakes >= 3) {
    setTimeout(() => triggerGameOver(), 2500);
  } else {
    if (gameState.type === 'reading') {
      setTimeout(() => { if (gameState.isActive) nextReadingQuestion(); }, 3000);
    } else if (gameState.type === 'season') {
      setTimeout(() => { if (gameState.isActive) nextSeasonQuestion(); }, 4000);
    }
  }
}

// 時間切れ
function timeUp() {
  if (gameState.answered) return;

  gameState.answered = true;
  clearInterval(gameState.timer);
  gameState.mistakes++;

  let message = '';
  if (gameState.type === 'reading') {
    message = `時間切れ！正解は「${gameState.currentKigo.k}」でした。`;
    gameInput.disabled = true;
    submitBtn.style.display = 'none';
  } else if (gameState.type === 'season') {
    message = `時間切れ！「${gameState.currentKigo.w}」は${gameState.currentKigo.s}の季語でした。`;
    document.querySelectorAll('.season-option').forEach(btn => { btn.disabled = true; });
  }

  skipBtn.style.display = 'none';
  showResult(message, 'incorrect');
  updateScore();

  if (gameState.mistakes >= 3) {
    setTimeout(() => triggerGameOver(), 2500);
  } else {
    if (gameState.type === 'reading') {
      setTimeout(() => { if (gameState.isActive) nextReadingQuestion(); }, 4000);
    } else if (gameState.type === 'season') {
      setTimeout(() => { if (gameState.isActive) nextSeasonQuestion(); }, 4000);
    }
  }
}

function showResult(message, type) {
  result.textContent = message;
  result.className = `result ${type}`;
  result.style.display = 'block';
}

// Enterキーで回答
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && gameState.type === 'reading' && gameState.isActive && !gameState.answered) {
    submitAnswer();
  }
});

// 初期化
console.log('季語ゲームアプリが読み込まれました');
console.log(`データ: ${ALL_KIGO.length}個の季語`);
</script>
